<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PH Insurance SMS Bot Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; }
    header h1 { margin: 0; font-size: 20px; }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .controls input, .controls select, .controls button {
      background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 14px;
    }
    .controls button { background: #2563eb; border-color: #2563eb; cursor: pointer; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #1e293b; padding: 16px; border-radius: 8px; border: 1px solid #334155; }
    .card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 16px; margin: 0 0 12px; color: #cbd5e1; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #334155; font-size: 13px; }
    th { background: #0f172a; color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: #273449; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #334155; }
    .tab { padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: #94a3b8; }
    .tab.active { color: #e2e8f0; border-bottom-color: #2563eb; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
    .badge.success { background: #166534; color: #bbf7d0; }
    .badge.warn { background: #854d0e; color: #fef3c7; }
    .badge.danger { background: #991b1b; color: #fecaca; }
    .badge.neutral { background: #334155; color: #cbd5e1; }
    .messages-panel { background: #1e293b; padding: 16px; border-radius: 8px; max-height: 500px; overflow-y: auto; }
    .msg { padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 75%; font-size: 13px; }
    .msg.inbound { background: #334155; margin-right: auto; }
    .msg.outbound { background: #1d4ed8; color: white; margin-left: auto; }
    .msg .meta { font-size: 10px; opacity: 0.7; margin-top: 4px; }
    .close-btn { background: #334155; color: #e2e8f0; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .sandbox-layout { display: flex; gap: 20px; height: calc(100vh - 200px); min-height: 500px; }
    .sandbox-vars { width: 30%; min-width: 260px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; padding: 16px; overflow-y: auto; }
    .sandbox-vars h3 { margin: 0 0 12px; font-size: 14px; color: #cbd5e1; }
    .sandbox-vars label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; margin-top: 10px; }
    .sandbox-vars input, .sandbox-vars select {
      width: 100%; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; padding: 6px 10px; border-radius: 4px; font-size: 13px;
    }
    .sandbox-vars button { margin-top: 16px; width: 100%; background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .sandbox-vars button:hover { background: #475569; }
    .sandbox-chat { flex: 1; display: flex; flex-direction: column; background: #1e293b; border-radius: 8px; border: 1px solid #334155; overflow: hidden; }
    .sandbox-chat-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #334155; }
    .sandbox-chat-header h3 { margin: 0; font-size: 14px; color: #cbd5e1; }
    .sandbox-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .sb-msg { padding: 10px 12px; border-radius: 8px; max-width: 75%; font-size: 13px; word-wrap: break-word; }
    .sb-msg.user { background: #1d4ed8; color: white; margin-left: auto; }
    .sb-msg.bot { background: #334155; margin-right: auto; }
    .sb-msg .sb-meta { font-size: 10px; color: #94a3b8; margin-top: 4px; }
    .sb-typing { padding: 10px 12px; font-size: 13px; color: #94a3b8; font-style: italic; }
    .sandbox-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #334155; }
    .sandbox-input-row input { flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
    .sandbox-input-row button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .sandbox-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .logs-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .logs-controls input { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 260px; }
    .logs-controls button { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .logs-controls button.primary { background: #2563eb; border-color: #2563eb; }
    .logs-controls label { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .logs-controls label input[type="checkbox"] { accent-color: #2563eb; }
    .log-entry { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 10px 14px; margin-bottom: 6px; font-size: 13px; }
    .log-entry .log-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .log-entry .log-ts { color: #64748b; font-size: 11px; font-family: monospace; min-width: 70px; }
    .log-entry .log-stage { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em; }
    .log-stage.inbound { background: #1e3a5f; color: #60a5fa; }
    .log-stage.parse { background: #3b1f6e; color: #c084fc; }
    .log-stage.claude { background: #14532d; color: #86efac; }
    .log-stage.ghl_send { background: #713f12; color: #fdba74; }
    .log-stage.webhook_fire { background: #134e4a; color: #5eead4; }
    .log-stage.error { background: #7f1d1d; color: #fca5a5; }
    .log-entry .log-level { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .log-level.info { background: #64748b; }
    .log-level.warn { background: #eab308; }
    .log-level.error { background: #ef4444; }
    .log-entry .log-cid { font-family: monospace; font-size: 11px; color: #94a3b8; }
    .log-entry .log-msg { color: #e2e8f0; }
    .log-entry .log-toggle { color: #60a5fa; font-size: 11px; cursor: pointer; margin-top: 4px; display: inline-block; user-select: none; }
    .log-entry pre { background: #0f172a; color: #94a3b8; padding: 8px 10px; border-radius: 4px; font-size: 11px; overflow-x: auto; margin: 6px 0 0; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .logs-empty { color: #64748b; text-align: center; padding: 60px 20px; font-size: 14px; }
  </style>
</head>
<body>
  <header><h1>PH Insurance SMS Bot — Dashboard</h1></header>
  <main id="root"></main>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function fmt(v, digits = 0) {
      if (v === null || v === undefined || isNaN(v)) return '—';
      return Number(v).toFixed(digits);
    }
    function pct(v) {
      if (v === null || v === undefined || isNaN(v)) return '—';
      return (Number(v) * 100).toFixed(1) + '%';
    }

    function App() {
      const [tab, setTab] = useState('overview');
      const [locationId, setLocationId] = useState('');
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [analytics, setAnalytics] = useState(null);
      const [conversations, setConversations] = useState([]);
      const [performance, setPerformance] = useState([]);
      const [syncStatus, setSyncStatus] = useState(null);
      const [selectedConv, setSelectedConv] = useState(null);

      // Sandbox state
      const sbDefaults = { first_name: 'Walt', state: 'FL', offer: 'Final Expense', tags: 'fex-lead', bot_name: 'Sarah', agent_name: 'Jeremiah', contact_stage: 'lead', existing_age: '', existing_smoker: '', existing_health: '' };
      const [sbVars, setSbVars] = useState({ ...sbDefaults });
      const [sbMessages, setSbMessages] = useState([]);
      const [sbInput, setSbInput] = useState('');
      const [sbLoading, setSbLoading] = useState(false);

      // Logs state
      const [logs, setLogs] = useState([]);
      const [logFilter, setLogFilter] = useState('');
      const [logAutoRefresh, setLogAutoRefresh] = useState(true);
      const [logExpanded, setLogExpanded] = useState({});

      const queryString = () => {
        const p = new URLSearchParams();
        if (locationId) p.set('location_id', locationId);
        if (startDate) p.set('start_date', startDate);
        if (endDate) p.set('end_date', endDate);
        return p.toString();
      };

      const load = async () => {
        const qs = queryString();
        const [a, c, p, s] = await Promise.all([
          fetch(`/api/analytics?${qs}`).then(r => r.json()),
          fetch(`/api/conversations?${qs}`).then(r => r.json()),
          fetch(`/api/message-performance?${qs}`).then(r => r.json()),
          fetch(`/api/sync-status`).then(r => r.json())
        ]);
        setAnalytics(a); setConversations(c.conversations || []); setPerformance(p.performance || []); setSyncStatus(s);
      };

      useEffect(() => { load(); }, []);

      const openConv = async (contactId, locId) => {
        const res = await fetch(`/api/conversations/${contactId}/${locId}`).then(r => r.json());
        setSelectedConv(res);
      };

      const outcomeBadge = (outcome) => {
        if (!outcome) return <span className="badge neutral">active</span>;
        const map = {
          appointment_booked: 'success',
          fex_immediate: 'success',
          mp_immediate: 'success',
          human_handoff: 'warn',
          dnc: 'danger'
        };
        return <span className={`badge ${map[outcome] || 'neutral'}`}>{outcome}</span>;
      };

      const sbSend = async () => {
        const text = sbInput.trim();
        if (!text || sbLoading) return;
        setSbInput('');
        setSbMessages(prev => [...prev, { role: 'user', text }]);
        setSbLoading(true);
        try {
          const resp = await fetch('/sandbox/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ variables: sbVars, message: text })
          });
          const data = await resp.json();
          if (data.error) throw new Error(data.error);
          const botMsgs = (data.messages || []).map(m => ({
            role: 'bot', text: m,
            collected_data: data.collected_data,
            message_type: data.message_type,
            terminal_outcome: data.terminal_outcome,
            elapsed_ms: data.elapsed_ms
          }));
          setSbMessages(prev => [...prev, ...botMsgs]);
        } catch (err) {
          setSbMessages(prev => [...prev, { role: 'bot', text: '[Error: ' + err.message + ']' }]);
        }
        setSbLoading(false);
      };

      const sbReset = async () => {
        await fetch('/sandbox/reset', { method: 'POST' });
        setSbMessages([]);
      };

      const sbMessagesEndRef = React.useRef(null);
      React.useEffect(() => {
        if (sbMessagesEndRef.current) sbMessagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [sbMessages, sbLoading]);

      const fetchLogs = async () => {
        const qs = logFilter ? `?contact_id=${encodeURIComponent(logFilter)}` : '';
        const res = await fetch(`/api/logs${qs}`).then(r => r.json());
        setLogs(res.logs || []);
      };

      useEffect(() => {
        if (tab !== 'logs') return;
        fetchLogs();
        if (!logAutoRefresh) return;
        const interval = setInterval(fetchLogs, 3000);
        return () => clearInterval(interval);
      }, [tab, logFilter, logAutoRefresh]);

      const toggleLogExpand = (id) => setLogExpanded(prev => ({ ...prev, [id]: !prev[id] }));

      const fmtTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      };

      return (
        <div>
          <div className="controls">
            <input placeholder="location_id (blank = all)" value={locationId} onChange={e => setLocationId(e.target.value)} />
            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
            <button onClick={load}>Refresh</button>
          </div>

          <div className="tabs">
            {['overview', 'conversations', 'performance', 'sync', 'sandbox', 'logs'].map(t => (
              <div key={t} className={`tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                {t.charAt(0).toUpperCase() + t.slice(1)}
              </div>
            ))}
          </div>

          {tab === 'overview' && analytics && (
            <>
              <div className="cards">
                <div className="card"><div className="label">Total Conversations</div><div className="value">{analytics.summary.total_conversations}</div></div>
                <div className="card"><div className="label">Appointments</div><div className="value">{analytics.summary.appointments_booked}</div></div>
                <div className="card"><div className="label">Appointment Rate</div><div className="value">{pct(analytics.summary.appointment_rate)}</div></div>
                <div className="card"><div className="label">Handoffs</div><div className="value">{analytics.summary.human_handoffs}</div></div>
                <div className="card"><div className="label">DNC</div><div className="value">{analytics.summary.dnc_count}</div></div>
                <div className="card"><div className="label">Opt-out Rate</div><div className="value">{pct(analytics.summary.opt_out_rate)}</div></div>
                <div className="card"><div className="label">Avg Msgs / Conv</div><div className="value">{fmt(analytics.summary.avg_messages_per_conversation, 1)}</div></div>
                <div className="card"><div className="label">Avg Reply Time (s)</div><div className="value">{fmt(analytics.summary.avg_response_time_seconds, 0)}</div></div>
              </div>

              {analytics.per_location && analytics.per_location.length > 0 && (
                <div className="section">
                  <h2>Per-Location Breakdown</h2>
                  <table>
                    <thead><tr><th>Location</th><th>Total</th><th>Appointments</th><th>DNC</th></tr></thead>
                    <tbody>
                      {analytics.per_location.map(l => (
                        <tr key={l.location_id}><td>{l.location_id}</td><td>{l.total}</td><td>{l.appointments}</td><td>{l.dnc}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}

          {tab === 'conversations' && (
            <>
              <table>
                <thead><tr><th>Name</th><th>Phone</th><th>Location</th><th>Product</th><th>Stage</th><th>Outcome</th><th>Msgs</th><th>Last Msg</th></tr></thead>
                <tbody>
                  {conversations.map(c => (
                    <tr key={c.id} className="clickable" onClick={() => openConv(c.contact_id, c.location_id)}>
                      <td>{c.first_name} {c.last_name}</td>
                      <td>{c.phone}</td>
                      <td>{c.location_id}</td>
                      <td>{c.product_type}</td>
                      <td>{c.contact_stage}</td>
                      <td>{outcomeBadge(c.terminal_outcome)}</td>
                      <td>{c.message_count}</td>
                      <td>{c.last_message_at ? new Date(c.last_message_at).toLocaleString() : ''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {selectedConv && (
                <div className="section" style={{marginTop: 24}}>
                  <h2>
                    Conversation: {selectedConv.conversation.first_name} {selectedConv.conversation.last_name}
                    <button className="close-btn" style={{marginLeft: 12}} onClick={() => setSelectedConv(null)}>Close</button>
                  </h2>
                  <div className="messages-panel">
                    {selectedConv.messages.map(m => (
                      <div key={m.id} className={`msg ${m.direction}`}>
                        {m.content}
                        <div className="meta">{m.message_type || ''} · {new Date(m.created_at).toLocaleString()}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {tab === 'performance' && (
            <table>
              <thead><tr><th>Message Type</th><th>Total Sent</th><th>Replies</th><th>Reply Rate</th><th>Avg Reply Time (s)</th></tr></thead>
              <tbody>
                {performance.map(p => (
                  <tr key={p.message_type}>
                    <td>{p.message_type}</td>
                    <td>{p.total_sent}</td>
                    <td>{p.replies}</td>
                    <td>{pct(p.reply_rate)}</td>
                    <td>{fmt(p.avg_reply_time_seconds, 0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          {tab === 'sync' && syncStatus && (
            <div className="cards">
              <div className="card"><div className="label">Pending Syncs</div><div className="value">{syncStatus.pending_syncs}</div></div>
              <div className="card"><div className="label">Last Sync</div><div className="value" style={{fontSize: 16}}>{syncStatus.last_synced_at ? new Date(syncStatus.last_synced_at).toLocaleString() : 'never'}</div></div>
            </div>
          )}

          {tab === 'logs' && (
            <div>
              <div className="logs-controls">
                <input
                  placeholder="Filter by contact_id..."
                  value={logFilter}
                  onChange={e => setLogFilter(e.target.value)}
                />
                <button className="primary" onClick={fetchLogs}>Refresh</button>
                <button onClick={() => setLogFilter('')}>Clear filter</button>
                <label>
                  <input type="checkbox" checked={logAutoRefresh} onChange={e => setLogAutoRefresh(e.target.checked)} />
                  Auto-refresh
                </label>
              </div>
              {logs.length === 0 ? (
                <div className="logs-empty">No logs yet. Trigger a webhook to see activity.</div>
              ) : (
                logs.map(entry => (
                  <div key={entry.id} className="log-entry">
                    <div className="log-header">
                      <span className="log-ts">{fmtTime(entry.timestamp)}</span>
                      <span className={`log-stage ${entry.stage}`}>{entry.stage}</span>
                      <span className={`log-level ${entry.level}`} title={entry.level}></span>
                      {entry.contact_id && <span className="log-cid">{entry.contact_id}</span>}
                      <span className="log-msg">{entry.message}</span>
                    </div>
                    {entry.data && (
                      <>
                        <span className="log-toggle" onClick={() => toggleLogExpand(entry.id)}>
                          {logExpanded[entry.id] ? 'Hide data' : 'Show data'}
                        </span>
                        {logExpanded[entry.id] && <pre>{JSON.stringify(entry.data, null, 2)}</pre>}
                      </>
                    )}
                  </div>
                ))
              )}
            </div>
          )}

          {tab === 'sandbox' && (
            <div className="sandbox-layout">
              <div className="sandbox-vars">
                <h3>Test Variables</h3>
                <label>First Name</label>
                <input value={sbVars.first_name} onChange={e => setSbVars(v => ({...v, first_name: e.target.value}))} />
                <label>State</label>
                <input value={sbVars.state} onChange={e => setSbVars(v => ({...v, state: e.target.value}))} />
                <label>Offer</label>
                <select value={sbVars.offer} onChange={e => setSbVars(v => ({...v, offer: e.target.value}))}>
                  <option>Final Expense</option>
                  <option>Mortgage Protection</option>
                  <option>Other</option>
                </select>
                <label>Tags (comma-separated)</label>
                <input value={sbVars.tags} onChange={e => setSbVars(v => ({...v, tags: e.target.value}))} />
                <label>Bot Name</label>
                <input value={sbVars.bot_name} onChange={e => setSbVars(v => ({...v, bot_name: e.target.value}))} />
                <label>Agent Name</label>
                <input value={sbVars.agent_name} onChange={e => setSbVars(v => ({...v, agent_name: e.target.value}))} />
                <label>Contact Stage</label>
                <select value={sbVars.contact_stage} onChange={e => setSbVars(v => ({...v, contact_stage: e.target.value}))}>
                  <option value="lead">lead</option>
                  <option value="client">client</option>
                  <option value="application">application</option>
                </select>
                <label>Existing Age (optional)</label>
                <input value={sbVars.existing_age} onChange={e => setSbVars(v => ({...v, existing_age: e.target.value}))} />
                <label>Existing Smoker (optional)</label>
                <input value={sbVars.existing_smoker} onChange={e => setSbVars(v => ({...v, existing_smoker: e.target.value}))} />
                <label>Existing Health (optional)</label>
                <input value={sbVars.existing_health} onChange={e => setSbVars(v => ({...v, existing_health: e.target.value}))} />
                <button onClick={() => setSbVars({...sbDefaults})}>Reset Variables to Defaults</button>
              </div>
              <div className="sandbox-chat">
                <div className="sandbox-chat-header">
                  <h3>Sandbox Chat</h3>
                  <button className="close-btn" onClick={sbReset}>Clear Conversation</button>
                </div>
                <div className="sandbox-messages">
                  {sbMessages.map((m, i) => (
                    <div key={i} className={`sb-msg ${m.role}`}>
                      {m.text}
                      {m.role === 'bot' && (
                        <div className="sb-meta">
                          {m.message_type && <span>{m.message_type}</span>}
                          {m.terminal_outcome && <span> · outcome: {m.terminal_outcome}</span>}
                          {m.collected_data && Object.keys(m.collected_data).filter(k => m.collected_data[k]).length > 0 && (
                            <span> · collected: {JSON.stringify(Object.fromEntries(Object.entries(m.collected_data).filter(([,v]) => v)))}</span>
                          )}
                          {m.elapsed_ms && <span> · {m.elapsed_ms}ms</span>}
                        </div>
                      )}
                    </div>
                  ))}
                  {sbLoading && <div className="sb-typing">...</div>}
                  <div ref={sbMessagesEndRef} />
                </div>
                <div className="sandbox-input-row">
                  <input
                    value={sbInput}
                    onChange={e => setSbInput(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') sbSend(); }}
                    placeholder="Type a message..."
                    disabled={sbLoading}
                  />
                  <button onClick={sbSend} disabled={sbLoading || !sbInput.trim()}>Send</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
