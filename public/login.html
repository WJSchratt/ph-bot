<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Hexagon — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#080c12; --surface:#0f1621; --surface2:#151d2b; --border:#1c2a3a; --border2:#253447; --cyan:#00d4ff; --red:#ff4560; --text:#c8d8e8; --muted:#4a6580; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:radial-gradient(ellipse at top,#10202f 0%,var(--bg) 55%);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 30px;width:360px;max-width:92vw;box-shadow:0 18px 50px rgba(0,0,0,.6);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.logo-text{font-size:17px;font-weight:700;letter-spacing:1px;color:#fff;}
.logo-sub{font-size:9px;font-family:'JetBrains Mono';color:var(--cyan);letter-spacing:2px;}
.title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:22px;}
label{font-size:10px;letter-spacing:1.5px;color:var(--muted);font-weight:600;text-transform:uppercase;display:block;margin:14px 0 6px;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:7px;font-family:'Rajdhani';font-size:14px;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--cyan);}
button{width:100%;margin-top:18px;padding:11px;border-radius:7px;border:1px solid var(--cyan);background:var(--cyan);color:#000;font-family:'Rajdhani';font-weight:700;font-size:14px;letter-spacing:.5px;cursor:pointer;transition:background .15s;}
button:hover{background:#00bbee;}
button:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.25);color:var(--red);font-size:12px;padding:8px 11px;border-radius:6px;margin-top:14px;display:none;}
.err.show{display:block;}
.footer{margin-top:20px;font-size:10px;color:var(--muted);text-align:center;font-family:'JetBrains Mono';letter-spacing:1px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <polygon points="13,2 23,7.5 23,18.5 13,24 3,18.5 3,7.5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <polygon points="13,7 18,9.8 18,16.2 13,19 8,16.2 8,9.8" fill="rgba(0,212,255,.12)" stroke="#00d4ff" stroke-width="1"/>
    </svg>
    <div><div class="logo-text">PROFIT HEXAGON</div><div class="logo-sub">SMS AI COMMAND</div></div>
  </div>
  <div class="title">Sign in</div>
  <div class="subtitle">Authorized operators only.</div>
  <form id="lf" autocomplete="off">
    <label for="u">Username</label>
    <input id="u" name="username" type="text" autocomplete="username" autofocus required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <div class="err" id="e"></div>
    <button type="submit" id="b">Sign In</button>
  </form>
  <div class="footer">SECURE CHANNEL</div>
</div>
<script>
// If already signed in, bounce to dashboard.
(function () {
  try {
    const t = localStorage.getItem('ph_token');
    if (t) window.location.replace('/');
  } catch {}
})();

document.getElementById('lf').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const b = document.getElementById('b');
  const e = document.getElementById('e');
  e.classList.remove('show');
  b.disabled = true;
  b.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        password: document.getElementById('p').value
      })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.token) {
      e.textContent = data.error || 'Invalid credentials';
      e.classList.add('show');
      b.disabled = false;
      b.textContent = 'Sign In';
      return;
    }
    try {
      localStorage.setItem('ph_token', data.token);
      localStorage.setItem('ph_user', data.username || '');
      if (data.expires_at) localStorage.setItem('ph_token_expires', String(data.expires_at));
    } catch {}
    window.location.replace('/');
  } catch (err) {
    e.textContent = 'Network error: ' + err.message;
    e.classList.add('show');
    b.disabled = false;
    b.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
